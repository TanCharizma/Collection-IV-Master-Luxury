<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- SEO & METADATA -->
    <meta name="description" content="Learn more about [Client Name] and their professional experience.">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://your-client-domain.com/about.html">
    
    <!-- Open Graph -->
    <meta property="og:title" content="About | Client Name">
    <meta property="og:description" content="Learn more about [Client Name] and their professional experience.">
    <meta property="og:image" content="https://your-client-domain.com/image/about/01.webp">
    <meta property="og:url" content="https://your-client-domain.com/about.html">
    <meta property="og:type" content="profile">
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="About | Client Name">
    <meta name="twitter:description" content="Learn more about [Client Name] and their professional experience.">
    <meta name="twitter:image" content="https://your-client-domain.com/image/about/01.webp">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FCFBF9" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#11100E" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="manifest.json">
    <title>About | Client Name</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <script src="config.js"></script>

    <!-- JSON-LD Structured Data for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfilePage",
      "mainEntity": {
        "@type": "Person",
        "name": "Client Name",
        "image": "https://your-client-domain.com/image/about/01.webp",
        "description": "Professional model and creative director.",
        "url": "https://your-client-domain.com/about.html"
      }
    }
    </script>
</head>
<body>

    <script src="nav.js"></script>
    <section class="about-hero-section" style="padding-top: 96px; border-top: none;">
        <div class="container">
            <div style="grid-column: span 12;">
                <h2 class="page-header">
                    <span lang="en">About</span>
                    <span lang="th">เกี่ยวกับฉัน</span>
                </h2>
                <div class="split-layout" style="text-align: left;">
                    <img src="image/about/01.webp" alt="Portrait" class="reveal reveal-restrained" loading="lazy">
                    <div class="bio reveal reveal-restrained delay-1" id="aboutBio">
                        <!-- Populated from config.js for fast client delivery -->
                    </div>
                </div>
            </div>
        </div>
        <div class="luxury-scroll-hint about-scroll-hint" aria-hidden="true">Scroll</div>
    </section>

    <section class="container luxury-clients-section luxury-clients-section--about" style="background: var(--surface);">
        <div class="luxury-clients-shell luxury-clients-shell--about">
            <h2 class="reveal reveal-emotional luxury-clients-heading">
                <span lang="en">Clients</span>
                <span lang="th">ลูกค้าที่ร่วมงาน</span>
            </h2>
            <div class="reveal reveal-fade delay-1 luxury-clients-row luxury-clients-row--about">
                <figure class="luxury-client-entry">
                    <span>01</span>
                    <img src="image/brand_icons/vogue.webp" alt="VOGUE" class="brand-logo luxury-brand-logo" loading="lazy" decoding="async">
                </figure>
                <figure class="luxury-client-entry">
                    <span>02</span>
                    <img src="image/brand_icons/elle.webp" alt="ELLE" class="brand-logo luxury-brand-logo" loading="lazy" decoding="async">
                </figure>
                <figure class="luxury-client-entry">
                    <span>03</span>
                    <img src="image/brand_icons/cartier.webp" alt="CARTIER" class="brand-logo luxury-brand-logo" loading="lazy" decoding="async">
                </figure>
                <figure class="luxury-client-entry">
                    <span>04</span>
                    <img src="image/brand_icons/armani.webp" alt="ARMANI" class="brand-logo luxury-brand-logo" loading="lazy" decoding="async">
                </figure>
                <figure class="luxury-client-entry">
                    <span>05</span>
                    <img src="image/brand_icons/levi.webp" alt="LEVI'S" class="brand-logo luxury-brand-logo" loading="lazy" decoding="async">
                </figure>
            </div>
        </div>
    </section>

    <section class="container luxury-about-manifesto-section" style="padding-bottom: 160px;">
        <div style="grid-column: span 12;">
            <div class="reveal reveal-emotional luxury-manifesto-block" style="padding: 96px; border: 1px solid #eee;">
                <p class="editorial-quote">
                    <span lang="en" id="manifestoEn"></span>
                    <span lang="th" id="manifestoTh"></span>
                </p>
            </div>
            
            <div class="luxury-contact-prompt" style="margin-top: 96px; text-align: center;">
                <h3>
                    <span lang="en">For bookings and inquiries</span>
                    <span lang="th">สำหรับการจองและติดต่อสอบถาม</span>
                </h3>
                <a href="/booking.html" class="btn-bold reveal delay-1">
                    <span lang="en">Booking Page</span>
                    <span lang="th">ไปที่หน้าการจอง</span>
                </a>
            </div>
        </div>
    </section>

    <script src="footer.js"></script>
    <script src="main.js"></script>
</body>
</html>
